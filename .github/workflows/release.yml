name: OW Who Said It Release Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  TAG: v${{ github.run_number }}
  IMAGE_FRONTEND: ow-who-said-it-frontend
  DEPLOYMENT_SERVER_DIRECTORY: ${{ secrets.DEPLOYMENT_SERVER_DIRECTORY }}
  SERVER_IP: ${{ secrets.SERVER_IP }}
  SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
  SSH_KEY: ${{ secrets.SSH_KEY }}
  APP_PORT: ${{ secrets.APP_PORT }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER@L}" >> $GITHUB_OUTPUT

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE_FRONTEND }}:latest

      - name: Upload deploy compose
        uses: actions/upload-artifact@v4
        with:
          name: deploy-compose
          path: docker-compose.deploy.yml

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Download deploy compose
        uses: actions/download-artifact@v4
        with:
          name: deploy-compose
          path: .

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${SERVER_IP}" >> ~/.ssh/known_hosts

      - name: Create directory structure on server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${SSH_USERNAME}@${SERVER_IP} <<EOF
          set -eo pipefail
          mkdir -p "${DEPLOYMENT_SERVER_DIRECTORY}"
          EOF

      - name: Push docker-compose file to server
        run: |
          scp -i ~/.ssh/id_ed25519 docker-compose.deploy.yml \
            ${SSH_USERNAME}@${SERVER_IP}:"${DEPLOYMENT_SERVER_DIRECTORY}/docker-compose.deploy.yml"

      - name: Write env file on server
        env:
          TAG: ${{ env.TAG }}
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          ssh -i ~/.ssh/id_ed25519 ${SSH_USERNAME}@${SERVER_IP} <<EOF
          set -eo pipefail
          TAG_VALUE="${TAG}"
          APP_PORT_VALUE="${APP_PORT:-8082}"
          GH_OWNER_LC="$(printf '%s' "${GH_OWNER}" | tr '[:upper:]' '[:lower:]')"

          cat > "${DEPLOYMENT_SERVER_DIRECTORY}/.env" << EOROOT
          TAG=${TAG_VALUE}
          GH_OWNER=${GH_OWNER_LC}
          APP_PORT=${APP_PORT_VALUE}
          EOROOT
          EOF

      - name: Login to GHCR on server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 ${SSH_USERNAME}@${SERVER_IP} <<EOF
          set -eo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          EOF

      - name: Pull and run containers on server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${SSH_USERNAME}@${SERVER_IP} <<EOF
          set -eo pipefail
          cd "${DEPLOYMENT_SERVER_DIRECTORY}"
          docker compose -f docker-compose.deploy.yml pull
          docker compose -f docker-compose.deploy.yml up -d
          EOF
